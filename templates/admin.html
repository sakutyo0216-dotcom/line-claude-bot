<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LINE Bot 管理</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Hiragino Sans", sans-serif;
           background: #f4f5f7; color: #222; }
    header { background: #06c755; color: #fff; padding: 10px 16px;
             display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 16px; margin: 0; }
    .logout { background: rgba(255,255,255,.2); color: #fff; border: none;
              padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .layout { display: flex; height: calc(100vh - 44px); }
    .sidebar { width: 280px; background: #fff; border-right: 1px solid #e3e3e3;
               overflow-y: auto; }
    .sidebar h2 { font-size: 13px; padding: 10px 14px; margin: 0;
                  color: #888; border-bottom: 1px solid #eee; }
    .user-row { padding: 10px 14px; border-bottom: 1px solid #eee;
                cursor: pointer; }
    .user-row:hover { background: #f0fff5; }
    .user-row.active { background: #e6f9ed; }
    .user-row .uid { font-size: 12px; color: #444; word-break: break-all; }
    .user-row .meta { font-size: 11px; color: #888; margin-top: 2px; }
    .user-row .preview { font-size: 12px; color: #555; margin-top: 4px;
                         overflow: hidden; text-overflow: ellipsis;
                         white-space: nowrap; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .messages { flex: 1; overflow-y: auto; padding: 16px;
                background: #ece5dd; }
    .msg { max-width: 70%; margin-bottom: 10px; padding: 8px 12px;
           border-radius: 8px; white-space: pre-wrap; word-break: break-word;
           font-size: 14px; line-height: 1.45; }
    .msg .ts { display: block; font-size: 10px; color: #888; margin-top: 4px; }
    .msg.user { background: #fff; }
    .msg.assistant { background: #dcf8c6; margin-left: auto; }
    .msg.system { background: #fffae0; color: #555; font-size: 12px;
                  margin: 8px auto; max-width: 90%; }
    .composer { display: flex; padding: 10px; gap: 8px;
                background: #f4f5f7; border-top: 1px solid #ddd; }
    .composer textarea { flex: 1; resize: none; padding: 8px;
                         border: 1px solid #ccc; border-radius: 6px;
                         font-size: 14px; font-family: inherit; min-height: 40px; }
    .composer button { padding: 8px 16px; background: #06c755; color: #fff;
                       border: none; border-radius: 6px; cursor: pointer; }
    .composer button:disabled { opacity: .5; cursor: not-allowed; }
    .empty { color: #888; padding: 40px; text-align: center; }
    .refresh { background: none; border: none; color: #06c755;
               font-size: 12px; cursor: pointer; padding: 6px 14px; }
    .status { font-size: 12px; padding: 4px 14px; color: #555; min-height: 18px; }
  </style>
</head>
<body>
<header>
  <h1>LINE Bot 管理画面</h1>
  <form method="post" action="/admin/logout" style="margin:0">
    <button class="logout" type="submit">ログアウト</button>
  </form>
</header>
<div class="layout">
  <aside class="sidebar">
    <h2>ユーザー一覧 <button class="refresh" onclick="loadUsers()">更新</button></h2>
    <div id="users"></div>
  </aside>
  <section class="main">
    <div class="status" id="status"></div>
    <div class="messages" id="messages">
      <div class="empty">左のユーザーを選択してください</div>
    </div>
    <form class="composer" id="composer" onsubmit="return sendMsg(event)" style="display:none">
      <textarea id="text" placeholder="メッセージを入力（Shift+Enterで改行 / Enterで送信）" rows="2"></textarea>
      <button type="submit" id="sendBtn">送信</button>
    </form>
  </section>
</div>

<script>
let currentUser = null;

async function loadUsers() {
  const res = await fetch('/admin/api/users');
  if (!res.ok) { alert('読み込み失敗: ' + res.status); return; }
  const users = await res.json();
  const wrap = document.getElementById('users');
  wrap.innerHTML = '';
  if (!users.length) {
    wrap.innerHTML = '<div class="empty">まだ会話履歴がありません</div>';
    return;
  }
  for (const u of users) {
    const row = document.createElement('div');
    row.className = 'user-row' + (u.user_id === currentUser ? ' active' : '');
    row.onclick = () => selectUser(u.user_id);
    row.innerHTML = `
      <div class="uid">${escapeHtml(u.user_id)}</div>
      <div class="meta">${escapeHtml(u.last_at || '')} / ${u.msg_count}件</div>
      <div class="preview">${escapeHtml((u.last_role === 'assistant' ? '↩ ' : '') + (u.last_content || '').slice(0, 60))}</div>
    `;
    wrap.appendChild(row);
  }
}

async function selectUser(userId) {
  currentUser = userId;
  document.querySelectorAll('.user-row').forEach(r => r.classList.remove('active'));
  for (const r of document.querySelectorAll('.user-row .uid')) {
    if (r.textContent === userId) r.parentElement.classList.add('active');
  }
  document.getElementById('composer').style.display = 'flex';
  await loadHistory();
}

async function loadHistory() {
  if (!currentUser) return;
  const res = await fetch('/admin/api/history?user_id=' + encodeURIComponent(currentUser));
  if (!res.ok) { alert('履歴取得失敗: ' + res.status); return; }
  const msgs = await res.json();
  const box = document.getElementById('messages');
  box.innerHTML = '';
  if (!msgs.length) {
    box.innerHTML = '<div class="empty">メッセージなし</div>';
    return;
  }
  for (const m of msgs) {
    const el = document.createElement('div');
    el.className = 'msg ' + (m.role === 'assistant' ? 'assistant' : (m.role === 'user' ? 'user' : 'system'));
    el.innerHTML = escapeHtml(m.content) + '<span class="ts">' + escapeHtml(m.created_at) + '</span>';
    box.appendChild(el);
  }
  box.scrollTop = box.scrollHeight;
}

async function sendMsg(e) {
  e.preventDefault();
  if (!currentUser) return false;
  const ta = document.getElementById('text');
  const text = ta.value.trim();
  if (!text) return false;
  const btn = document.getElementById('sendBtn');
  const status = document.getElementById('status');
  btn.disabled = true; status.textContent = '送信中...';
  try {
    const res = await fetch('/admin/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: currentUser, text }),
    });
    const data = await res.json();
    if (!data.ok) { status.textContent = '送信失敗: ' + (data.error || res.status); return false; }
    status.textContent = '送信しました';
    ta.value = '';
    await loadHistory();
    await loadUsers();
  } catch (err) {
    status.textContent = '通信エラー: ' + err;
  } finally {
    btn.disabled = false;
    setTimeout(() => { status.textContent = ''; }, 3000);
  }
  return false;
}

function escapeHtml(s) {
  return (s == null ? '' : String(s))
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

document.getElementById('text').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('composer').requestSubmit();
  }
});

loadUsers();
setInterval(() => { if (currentUser) loadHistory(); }, 15000);
</script>
</body>
</html>
