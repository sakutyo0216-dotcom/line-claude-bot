<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>管理画面ログイン</title>
  <style>
    body { font-family: -apple-system, "Hiragino Sans", sans-serif;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; background: #f4f5f7; }
    .card { background: #fff; padding: 32px 28px; border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,.08); width: 320px; }
    h1 { font-size: 18px; margin: 0 0 16px; }
    input[type=password] { width: 100%; padding: 10px; font-size: 15px;
                           border: 1px solid #ccc; border-radius: 6px;
                           box-sizing: border-box; }
    button { width: 100%; padding: 10px; margin-top: 12px; font-size: 15px;
             background: #06c755; color: #fff; border: none;
             border-radius: 6px; cursor: pointer; }
    .err { color: #c00; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/admin/login">
    <h1>LINE Bot 管理画面</h1>
    <input type="password" name="token" placeholder="ADMIN_TOKEN" autofocus required>
    <button type="submit">ログイン</button>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
  </form>
</body>
</html>
